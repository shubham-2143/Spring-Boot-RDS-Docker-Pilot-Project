<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Employee Management Portal</title>

    <meta charset="UTF-8">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #3498db;
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        tr:hover {
            background: #ecf5ff;
        }

        .salary {
            color: green;
            font-weight: bold;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #777;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Employee Management Portal</h1>
        <p>Spring Boot + RDS + Docker Pilot Project</p>
    </div>

    <!-- Form Card -->
    <div class="card">

        <h2>Add Employee</h2>
        <br>

        <form action="/save" method="post">

            <div class="form-grid">

                <input
                        type="text"
                        name="name"
                        placeholder="Employee Name"
                        required>

                <input
                        type="email"
                        name="email"
                        placeholder="Email Address"
                        required>

                <input
                        type="text"
                        name="department"
                        placeholder="Department"
                        required>

                <input
                        type="number"
                        name="salary"
                        placeholder="Salary"
                        required>

            </div>

            <div class="button-container">
                <button type="submit">
                    Add Employee
                </button>
            </div>

        </form>

    </div>

    <!-- Employee Table -->
    <div class="card">

        <h2>Employee Records</h2>
        <br>

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Salary</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="employee : ${employees}">

                <td th:text="${employee.id}"></td>

                <td th:text="${employee.name}"></td>

                <td th:text="${employee.email}"></td>

                <td th:text="${employee.department}"></td>

                <td class="salary"
                    th:text="${employee.salary}">
                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <div class="footer">
        Built using Spring Boot + Amazon RDS + Maven + Docker
    </div>

</div>

</body>
</html>
